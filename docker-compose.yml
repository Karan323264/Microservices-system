version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-net


  discovery-server:
    build:
      context: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - microservices-net


  company-service:
    image: company-service:1.0
    container_name: company-service
    depends_on:
      - postgres
      - discovery-server
    ports:
      - "8082:8082"
    networks:
      - microservices-net


  job-service:
    image: job-service:1.0
    container_name: job-service
    depends_on:
      - postgres
      - discovery-server
    ports:
      - "8081:8081"
    networks:
      - microservices-net


  review-service:
    image: review-service:1.0
    container_name: review-service
    depends_on:
      - postgres
      - discovery-server
    ports:
      - "8083:8083"
    networks:
      - microservices-net


volumes:
  postgres_data:

networks:
  microservices-net:
    driver: bridge