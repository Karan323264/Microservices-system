version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  company-service:
    image: company-service:1.0
    container_name: company-service
    depends_on:
      - postgres
    ports:
      - "8082:8082"

  job-service:
    image: job-service:1.0
    container_name: job-service
    depends_on:
      - postgres
    ports:
      - "8081:8081"

  review-service:
    image: review-service:1.0
    container_name: review-service
    depends_on:
      - postgres
    ports:
      - "8083:8083"

volumes:
  postgres_data: